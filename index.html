function render(){

let library=document.getElementById("library");

library.innerHTML="";

for(let folder in data){

let html=`<div class="folder"><h3>${folder}</h3>`;

data[folder].forEach((note,index)=>{

html+=`<div class="note" onclick="openNote('${folder}',${index})">📄 ${note.title}</div>`;

});

html+="</div>";

library.innerHTML+=html;

}

}

function openNote(folder,index){

let note = data[folder][index];

document.getElementById("library").style.display="none";
document.getElementById("reader").style.display="block";

document.getElementById("title").innerText = note.title;
document.getElementById("content").innerText = note.content;

}

function back(){

document.getElementById("library").style.display="block";
document.getElementById("reader").style.display="none";

}

function copyCode(){

let text=document.getElementById("content").innerText;

navigator.clipboard.writeText(text);

alert("Đã copy code");

}

render();
